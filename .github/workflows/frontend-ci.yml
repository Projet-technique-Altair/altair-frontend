name: Frontend CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: |
          if npm run | grep -q typecheck; then
            npm run typecheck
          else
            echo "No typecheck script defined, skipping"
          fi

      - name: Lint
        run: |
          if npm run | grep -q lint; then
            npm run lint
          else
            echo "No lint script defined, skipping"
          fi

      - name: Build
        run: npm run build
